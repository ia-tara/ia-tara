services:
  app:
    build:
      context: .
      target: app
    working_dir: /app/backend/tp
    ports:
      - "8000:8000"
    environment:
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      DJANGO_DEBUG: "false"
      SQLITE_PATH: /data/db.sqlite3
    volumes:
      - app_data:/data

volumes:
  app_data:
